<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic YouTube Video</title>
</head>
<body>

    <!-- The YouTube video will load inside this wrapper -->
    <div id="video-container"></div>

    <script>
        // Ask the user for a link or ID on reload
        let input = prompt("Enter a YouTube Video ID or full Link:");

        if (input) {
            let videoId = input.trim();

            // Extract ID if the user pasted a full URL
            if (videoId.includes("youtube.com") || videoId.includes("youtu.be")) {
                let urlParams = new URLSearchParams(new URL(videoId).search);
                videoId = urlParams.get("v") || videoId.split("/").pop();
            }

            // Create and embed your specific iframe code
            let iframe = document.createElement("iframe");
            iframe.src = `https://youtube-nocookie.com/embed/{videoId}`;
            iframe.width = "100%";
            iframe.height = "100%";
            iframe.setAttribute("frameborder", "0");
            iframe.setAttribute("allowfullscreen", "true");

            // Insert into the page
            document.getElementById("video-container").appendChild(iframe);
        } else {
            document.body.innerHTML = "<h3>No video ID provided. Refresh to try again.</h3>";
        }
    </script>

</body>
</html>
